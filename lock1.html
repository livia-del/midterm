<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>國堡門｜門鎖系列</title>
    <style>
        /* --- CSS 樣式區 --- */
        :root {
            --main-bg: #ffffff;
            --dark-blue: #708090;
            --accent-red: black;
            --text-gray: #666;
            --light-gray: #eeeeee;
            --font-family: "Microsoft JhengHei", "Noto Sans TC", sans-serif;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: var(--font-family);
        }

        body {
            background-color: #fcfcfc;
        }

        /* 隱藏 Radio 點選器 */
        input[type="radio"] {
            display: none;
        }

        /* 頁頭 Banner */
        .header-banner {
            background-color: var(--dark-blue);
            color: white;
            padding: 60px 0;
            text-align: center;
            border-bottom: 5px solid var(--accent-red);
        }

        .header-banner h1 {
            font-size: 2.5rem;
            letter-spacing: 4px;
        }

        /* 主佈局容器 */
        .main-container {
            max-width: 1200px;
            margin: 50px auto;
            display: flex;
            gap: 50px;
            padding: 0 20px;
        }

        /* 側邊欄設計 (參考：截圖 2026-05-01 凌晨2.10.14.png) */
        .sidebar {
            width: 280px;
            flex-shrink: 0;
        }

        .sidebar-title {
            font-size: 1.8rem;
            color: var(--dark-blue);
            border-left: 8px solid var(--accent-red);
            padding-left: 20px;
            margin-bottom: 40px;
            font-weight: bold;
            display: flex;
            align-items: center;
        }

        .category-list {
            list-style: none;
        }

        .category-list li {
            border-bottom: 1px solid var(--light-gray);
        }

        .category-list label {
            display: flex;
            align-items: center;
            padding: 20px 10px;
            cursor: pointer;
            transition: all 0.3s ease;
            color: var(--text-gray);
            font-size: 1.1rem;
        }

        .category-list label span {
            font-family: Arial, sans-serif;
            font-size: 0.9rem;
            margin-right: 20px;
            color: #ccc;
            transition: 0.3s;
        }

        .category-list label:hover {
            color: var(--accent-red);
            background: #f9f9f9;
        }

        /* --- 核心切換邏輯 --- */
        /* 當 Radio 被選中時，改變對應 label 的顏色與樣式 */
        #cat1:checked ~ .main-container .sidebar label[for="cat1"],
        #cat2:checked ~ .main-container .sidebar label[for="cat2"],
        #cat3:checked ~ .main-container .sidebar label[for="cat3"],
        #cat4:checked ~ .main-container .sidebar label[for="cat4"],
        #cat5:checked ~ .main-container .sidebar label[for="cat5"] {
            color: var(--accent-red);
            font-weight: bold;
        }

        #cat1:checked ~ .main-container .sidebar label[for="cat1"] span,
        #cat2:checked ~ .main-container .sidebar label[for="cat2"] span,
        #cat3:checked ~ .main-container .sidebar label[for="cat3"] span,
        #cat4:checked ~ .main-container .sidebar label[for="cat4"] span,
        #cat5:checked ~ .main-container .sidebar label[for="cat5"] span {
            color: var(--accent-red);
            opacity: 0.6;
        }

        /* 產品展示區 */
        .content-area {
            flex-grow: 1;
        }

        .product-group {
            display: none; /* 預設全部隱藏 */
            animation: fadeIn 0.6s ease-out;
        }

        /* 顯示對應內容 */
        #cat1:checked ~ .main-container .content-area .group-1,
        #cat2:checked ~ .main-container .content-area .group-2,
        #cat3:checked ~ .main-container .content-area .group-3,
        #cat4:checked ~ .main-container .content-area .group-4,
        #cat5:checked ~ .main-container .content-area .group-5 {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* 產品網格 */
        .product-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 30px;
        }

        .product-card {
            background: white;
            border: 1px solid #eee;
            overflow: hidden;
            transition: 0.4s;
            text-align: center;
        }

        .product-card:hover {
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            transform: translateY(-5px);
        }

        .product-card img {
            width: 100%;
            height: 250px; /* 設定一個固定的展示高度 */
            background-color: #ffffff; /* 如果圖片比例不符，旁邊會留白，背景設為白色較美觀 */
            object-fit: contain; /* 關鍵：確保看到圖片全貌，不裁切 */
            display: block;
            padding: 10px; /* 加入一點內距，讓圖片不緊貼邊框，更有高級感 */
        }

        .product-info {
            padding: 20px;
        }

        .product-info h4 {
            font-size: 1.2rem;
            color: var(--dark-blue);
            margin-bottom: 10px;
        }

        .product-info p {
            color: var(--text-gray);
            font-size: 0.9rem;
        }
    </style>
</head>
