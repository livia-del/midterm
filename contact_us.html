
<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>國堡門精品 - 居家安全與生活品味</title>
    <link rel="stylesheet" href="contact_us.css">
</head>
<body>

<section class="contact-section">
    <div class="container">
        <h2 class="section-title">聯絡我們 <span>Contact Us</span></h2>
        
        <div class="contact-wrapper">
            <!-- 左側：聯絡資訊 -->
            <div class="contact-info">
                <h3>鴻展科技股份有限公司</h3>
                <p><strong>地址：</strong> 台北市某某區某某路一段123號</p>
                <p><strong>電話：</strong> 0800-368-369</p>
                <p><strong>傳真：</strong> 02-8765-4321</p>
                <p><strong>信箱：</strong> service@hung-chan.com.tw</p>
                
                <!-- Google Map 預留區 -->
                <div class="map-placeholder">
                    <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3614.7021!2d121.5!3d25.0!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x0%3A0x0!2zMjXCsDAwJzAwLjAiTiAxMjHCsDMwJzAwLjAiRQ!5e0!3m2!1szh-TW!2stw!4v1620000000000!5m2!1szh-TW!2stw" width="100%" height="250" style="border:0;" allowfullscreen="" loading="lazy"></iframe>
                </div>
            </div>

            <!-- 右側：留言表單 -->
            <div class="contact-form">
                <form action="#">
                    <div class="form-group">
                        <label for="name">姓名 *</label>
                        <input type="text" id="name" name="name" required placeholder="請輸入姓名">
                    </div>
                    <div class="form-group">
                        <label for="email">電子信箱 *</label>
                        <input type="email" id="email" name="email" required placeholder="example@mail.com">
                    </div>
                    <div class="form-group">
                        <label for="subject">主旨</label>
                        <input type="text" id="subject" name="subject" placeholder="請輸入主旨">
                    </div>
                    <div class="form-group">
                        <label for="message">留言內容 *</label>
                        <textarea id="message" name="message" rows="5" required placeholder="請輸入您的需求..."></textarea>
                    </div>
                    <button type="submit" class="submit-btn">送出訊息</button>
                </form>
            </div>
        </div>
    </div>
</section>


</body>
</html>
